<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ticino Map - Mobile Bulletproof</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --accent-map: #38bdf8;
            --accent-sat: #10b981;
            --glass: rgba(30, 41, 59, 0.7);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%;  
            background-color: var(--bg-dark); font-family: 'Inter', sans-serif;
            color: #f8fafc; overflow: hidden;
            overscroll-behavior: none; /* Blocca il rimbalzo su iOS */
        }

        /* FIX RIGHE BIANCHE E SFONDO LEAFLET */
        .leaflet-tile-container img { width: 100.5% !important; height: 100.5% !important; margin: -0.5px; }
        .leaflet-container { background: var(--bg-dark) !important; }

        .app-wrapper {
            position: relative; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
        }

        /* MAPPA SU PC (Poster) */
        #map { 
            width: 500px; height: 85vh; 
            border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1;
        }

        /* FULLSCREEN FORZATO DA JS */
        .force-fullscreen #map {
            width: 100vw !important; height: 100vh !important; max-width: none !important;
            border-radius: 0 !important; border: none !important;
        }
        .force-fullscreen .ui-left { display: none !important; }
        .force-fullscreen .ui-right-toolbar { top: auto; bottom: 30px; transform: scale(0.9); right: 15px; flex-direction: row; align-items: flex-end; }

        /* UI SINISTRA */
        .ui-left { position: absolute; left: 5%; bottom: 8%; z-index: 10; pointer-events: none; }
        .tm-title { font-size: 3.5rem; font-weight: 800; margin: 0; line-height: 1; background: linear-gradient(135deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-panel { background: var(--glass); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; pointer-events: auto; }
        .legend-box { padding: 20px; width: 250px; }
        .legend-item { display: flex; align-items: center; margin-bottom: 10px; font-size: 0.85rem; }
        .color-line { width: 25px; height: 4px; border-radius: 2px; margin-right: 12px; }

        /* UI DESTRA */
        .ui-right-toolbar { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); z-index: 10000; display: flex; flex-direction: column; gap: 12px; }
        .v-switch-box { padding: 15px 10px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .sw-container { position: relative; width: 30px; height: 70px; }
        .sw-container input { opacity: 0; width: 0; height: 0; }
        .sw-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: var(--accent-map); border-radius: 20px; transition: 0.4s; }
        .sw-slider:before { content: ""; position: absolute; height: 22px; width: 22px; left: 4px; bottom: 4px; background: white; border-radius: 50%; transition: 0.4s; }
        input:checked + .sw-slider { background: var(--accent-sat); }
        input:checked + .sw-slider:before { transform: translateY(-38px); }

        .btn-group { display: flex; flex-direction: column; gap: 8px; padding: 8px; }
        .m-btn { width: 48px; height: 48px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4); cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .f-ti { width: 24px; height: 24px; border-radius: 3px; background: linear-gradient(#da291c 50%, #0033a0 50%); }
        .f-ch { width: 24px; height: 24px; border-radius: 3px; background: #da291c; position: relative; }
        .f-ch:before { content: ""; position: absolute; width: 4px; height: 14px; background: white; left: 10px; top: 5px; }
        .f-ch:after { content: ""; position: absolute; width: 14px; height: 4px; background: white; left: 5px; top: 10px; }
        .geo-target { width: 20px; height: 20px; border: 2px solid var(--accent-map); border-radius: 50%; display: flex; justify-content: center; align-items: center; }
        .geo-target:after { content: ""; width: 6px; height: 6px; background: var(--accent-map); border-radius: 50%; }

        /* 📱 MOBILE FIX ASSOLUTO */
        @media (max-width: 768px) {
            .app-wrapper { display: block; } /* Rimuove il flexbox che confonde Safari */
            #map { 
                width: 100vw !important; 
                height: 100vh !important; 
                height: 100dvh !important; /* DVH per risolvere la barra degli indirizzi di iOS */
                max-width: none !important; 
                border-radius: 0 !important; 
                border: none !important; 
            }
            .ui-left { display: none !important; }
        }
    </style>
</head>
<body>

<div class="app-wrapper" id="app-wrapper">
    <div class="ui-left">
        <h1 class="tm-title">Ticino</h1>
        <div class="glass-panel legend-box">
            <div class="legend-item"><div class="color-line" style="background:#f29b46"></div> Autostrada</div>
            <div class="legend-item"><div class="color-line" style="background:#e33030"></div> Principale</div>
            <div class="legend-item"><div class="color-line" style="background: repeating-linear-gradient(90deg, #99245c, #99245c 4px, transparent 4px, transparent 8px)"></div> Confine</div>
        </div>
    </div>

    <div id="map">
        <div class="ui-right-toolbar">
            <div class="glass-panel v-switch-box">
                <label class="sw-container">
                    <input type="checkbox" id="satToggle">
                    <span class="sw-slider"></span>
                </label>
            </div>
            <div class="glass-panel btn-group">
                <button class="m-btn" id="go-geo"><div class="geo-target"></div></button>
                <button class="m-btn" id="go-ti"><div class="f-ti"></div></button>
                <button class="m-btn" id="go-ch"><div class="f-ch"></div></button>
            </div>
        </div>
    </div>
</div>

<script>
    // Inizializzazione immediata (niente attese che causano crash neri)
    var map = L.map('map', { 
        zoomControl: false, 
        doubleClickZoom: false 
        // RIMOSSO zoomSnap per compatibilità totale con Swisstopo su schermi Retina
    });

    L.control.zoom({ position: 'topright' }).addTo(map);

    var topo = L.tileLayer('https://wmts.geo.admin.ch/1.0.0/ch.swisstopo.pixelkarte-farbe-pk200.noscale/default/current/3857/{z}/{x}/{y}.jpeg', { attribution: 'swisstopo', maxZoom: 18 });
    var satellite = L.tileLayer('https://wmts.geo.admin.ch/1.0.0/ch.swisstopo.swissimage/default/current/3857/{z}/{x}/{y}.jpeg', { attribution: 'swisstopo', maxZoom: 18 });

    topo.addTo(map);

    // Diamo una coordinata fissa iniziale per costringere il download delle immagini!
    map.setView([46.2, 8.8], 9);

    var boundsTI = [[45.81, 8.40], [46.63, 9.15]];
    var boundsCH = [[45.8, 5.9], [47.8, 10.5]];

    // Dopo un attimo, inquadriamo bene il Ticino ricalcolando le dimensioni finali del telefono
    setTimeout(function() {
        map.invalidateSize();
        map.fitBounds(boundsTI);
    }, 200);

    // Eventi UI
    L.DomEvent.disableClickPropagation(document.querySelector('.ui-right-toolbar'));
    L.DomEvent.disableScrollPropagation(document.querySelector('.ui-right-toolbar'));

    document.getElementById('satToggle').onchange = function(e) {
        if(e.target.checked) { map.removeLayer(topo); satellite.addTo(map); }
        else { map.removeLayer(satellite); topo.addTo(map); }
    };

    document.getElementById('go-ti').onclick = () => map.fitBounds(boundsTI);
    document.getElementById('go-ch').onclick = () => map.fitBounds(boundsCH);

    var userMarker;
    document.getElementById('go-geo').onclick = function() {
        map.locate({setView: true, maxZoom: 13});
    };
    map.on('locationfound', (e) => {
        if(userMarker) map.removeLayer(userMarker);
        userMarker = L.circleMarker(e.latlng, {radius: 8, color: 'white', fillColor: '#38bdf8', fillOpacity: 1}).addTo(map);
    });

    // Finto schermo intero (Doppio tap)
    var wrapper = document.getElementById('app-wrapper');
    var isMobile = window.innerWidth < 768;
    var lastTap = 0;
    
    document.getElementById('map').addEventListener('touchstart', function(e) {
        var now = new Date().getTime();
        var timesince = now - lastTap;
        if ((timesince < 300) && (timesince > 0)) {
            if (isMobile) {
                wrapper.classList.toggle('force-fullscreen');
                setTimeout(() => map.invalidateSize(true), 150);
            }
        }
        lastTap = now;
    });

    window.addEventListener('resize', () => {
        setTimeout(() => map.invalidateSize(true), 300);
    });
</script>

</body>
</html>
